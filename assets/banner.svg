<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0" stop-color="#0f172a" />
      <stop offset="1" stop-color="#0b1220" />
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,0.06)" />
      <stop offset="1" stop-color="rgba(255,255,255,0.02)" />
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" result="b"/>
      <feBlend in="SourceGraphic" in2="b" mode="screen"/>
    </filter>
  </defs>
  <rect width="1200" height="300" fill="url(#g1)" />
  <g filter="url(#blur)">
    <circle cx="180" cy="120" r="100" fill="#0ea5a4" opacity="0.06" />
    <circle cx="1020" cy="60" r="140" fill="#7c3aed" opacity="0.05" />
  </g>
  <g transform="translate(48,42)">
    <rect x="0" y="0" width="1104" height="216" rx="16" fill="url(#glass)" stroke="rgba(255,255,255,0.06)" />
    <g transform="translate(36,28)">
      <text x="0" y="34" fill="#e6eef8" font-size="28" font-family="Inter, Helvetica, Arial">Akash Kumawat</text>
      <text x="0" y="66" fill="#c7d6e8" font-size="14" font-family="Inter, Helvetica, Arial">Frontend Engineering Lead — Enterprise UI Architect — Angular & React</text>
    </g>
    <g transform="translate(880,36)">
      <rect x="0" y="0" width="120" height="36" rx="8" fill="#0ea5a4" />
      <text x="60" y="23" fill="#042027" font-size="13" font-family="Inter, Helvetica, Arial" text-anchor="middle">Pune, India</text>
    </g>
  </g>
</svg>
